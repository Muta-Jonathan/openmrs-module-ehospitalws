name: Maven Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the main branch explicitly instead of the release tag. The
          # release event otherwise leaves the repo in detached-HEAD state, which
          # makes maven-release-plugin fail with "ref HEAD is not a symbolic ref"
          # during the SCM commit step. We hardcode 'main' rather than using
          # github.event.release.target_commitish because that value is a commit
          # SHA (still detached) when a release is created targeting a commit
          # instead of a branch.
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Configure Git
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          # maven-release-plugin pushes using the token-less HTTPS URL from the
          # POM's <developerConnection>, not the origin remote above. Rewrite any
          # github.com HTTPS URL to inject the token so the release push authenticates.
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>repsys-releases</id>
                <username>${{ secrets.REPSYS_MAVEN_USERNAME }}</username>
                <password>${{ secrets.REPSYS_MAVEN_PASSWORD }}</password>
              </server>
              <server>
                <id>repsys-snapshots</id>
                <username>${{ secrets.REPSYS_MAVEN_USERNAME }}</username>
                <password>${{ secrets.REPSYS_MAVEN_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Perform Maven release
        run: |
          mvn --batch-mode release:prepare release:perform \
            -Darguments="-DskipTests"
