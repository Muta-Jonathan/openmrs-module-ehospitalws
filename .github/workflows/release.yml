name: Maven Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Configure Git
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>repsys-releases</id>
                <username>${{ secrets.REPSYS_MAVEN_USERNAME }}</username>
                <password>${{ secrets.REPSYS_MAVEN_PASSWORD }}</password>
              </server>
              <server>
                <id>repsys-snapshots</id>
                <username>${{ secrets.REPSYS_MAVEN_USERNAME }}</username>
                <password>${{ secrets.REPSYS_MAVEN_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Perform Maven release
        run: |
          mvn --batch-mode release:prepare release:perform \
            -DrepsysReleasesUrl=${{ secrets.REPSYS_RELEASES_URL }} \
            -DrepsysSnapshotsUrl=${{ secrets.REPSYS_SNAPSHOTS_URL }} \
            -Darguments="-DskipTests \
              -DrepsysReleasesUrl=${{ secrets.REPSYS_RELEASES_URL }} \
              -DrepsysSnapshotsUrl=${{ secrets.REPSYS_SNAPSHOTS_URL }}"
